version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: sync_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: salesforce_jira_sync

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sync_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/salesforce_jira_sync
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - DEMO_MODE=true
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sync_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_DEMO_MODE=true

volumes:
  mongo_data:
